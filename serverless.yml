service: vet-clinic
 
provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  environment:
    PETS_TABLE: ${self:service}-pets-${self:provider.stage}
    FRONTEND_BUCKET: ${self:service}-frontend-${self:provider.stage}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
          Resource:
            - !GetAtt PetsTable.Arn
 
functions:
  createPet:
    handler: src/pets/create.handler
    events:
      - httpApi:
          path: /pets
          method: POST
 
  listPets:
    handler: src/pets/list.handler
    events:
      - httpApi:
          path: /pets
          method: GET
 
  getPet:
    handler: src/pets/get.handler
    events:
      - httpApi:
          path: /pets/{id}
          method: GET
 
  updatePet:
    handler: src/pets/update.handler
    events:
      - httpApi:
          path: /pets/{id}
          method: PUT
 
  deletePet:
    handler: src/pets/delete.handler
    events:
      - httpApi:
          path: /pets/{id}
          method: DELETE
 
resources:
  Resources:
    PetsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.PETS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
 
    FrontendBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:provider.environment.FRONTEND_BUCKET}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        WebsiteConfiguration:
          IndexDocument: index.html
 
    FrontendBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref FrontendBucket
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource: !Sub '${FrontendBucket.Arn}/*'
 
  Outputs:
    ApiUrl:
      Value: !Sub 'https://${HttpApi}.execute-api.${self:provider.region}.amazonaws.com'
    FrontendUrl:
      Value: !Sub 'http://${FrontendBucket}.s3-website-${self:provider.region}.amazonaws.com'
